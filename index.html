<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO LIST</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 오버레이 -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <h2>TODO List</h2>
      <p class="auth-sub">할 일을 관리하세요</p>
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">로그인</button>
        <button class="auth-tab" id="signupTab" onclick="switchAuthTab('signup')">회원가입</button>
      </div>
      <p class="auth-error" id="authError"></p>
      <input class="auth-input" type="email" id="authEmail" placeholder="이메일" />
      <input class="auth-input" type="password" id="authPassword" placeholder="비밀번호 (6자 이상)" />
      <button class="auth-submit" id="authSubmitBtn" onclick="submitAuth()">로그인</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="header-top">
        <h1>TODO List</h1>
        <button class="logout-btn" onclick="handleSignOut()">로그아웃</button>
      </div>
      <p class="subtitle" id="userEmail"></p>
    </div>

    <div class="group-manager">
      <div class="group-input-row">
        <input type="text" id="groupInput" placeholder="그룹 이름 입력 (예: Home, Work)" />
        <button onclick="addGroup()">+ 그룹 추가</button>
      </div>
      <div id="groupChips" class="group-chips"></div>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
      <button onclick="addTodo()">추가</button>
    </div>

    <div class="input-sub-row">
      <button class="desc-add-btn" id="descAddBtn" onclick="toggleDescInput()">+ 설명 추가</button>
      <select id="todoGroup">
        <option value="">그룹 없음</option>
      </select>
    </div>

    <div class="desc-input-area" id="descInputArea">
      <textarea id="todoDesc" placeholder="설명을 입력하세요" rows="2"></textarea>
    </div>

    <div class="tabs" style="margin: 0 28px 8px;">
      <button class="tab-btn active" onclick="switchTab('all', this)">전체</button>
      <button class="tab-btn" onclick="switchTab('active', this)">진행중</button>
      <button class="tab-btn" onclick="switchTab('done', this)">완료</button>
    </div>

    <div class="group-tabs-row" id="groupTabsRow"></div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="bottom-row">
      <p class="remaining-count" id="remainingCount"></p>
      <button class="delete-btn" onclick="deleteCompleted()">완료 항목 삭제</button>
    </div>
  </div>

  <script type="module" src="/src/script.js"></script>
</body>
</html>
