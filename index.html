<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO LIST</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TODO List</h1>
      <p class="subtitle">오늘의 할 일을 정리해보세요.</p>
    </div>

    <div class="group-manager">
      <div class="group-input-row">
        <input type="text" id="groupInput" placeholder="그룹 이름 입력 (예: Home, Work)" />
        <button onclick="addGroup()">그룹 추가1</button>
      </div>
      <div id="groupChips" class="group-chips"></div>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
      <button onclick="addTodo()">추가</button>
    </div>

    <div class="input-sub-row">
      <button class="desc-add-btn" id="descAddBtn" onclick="toggleDescInput()">+ 설명 추가</button>
      <select id="todoGroup">
        <option value="">그룹 없음</option>
      </select>
    </div>

    <div class="desc-input-area" id="descInputArea">
      <textarea id="todoDesc" placeholder="설명을 입력하세요" rows="2"></textarea>
    </div>

    <div class="tabs" style="margin: 0 28px 8px;">
      <button class="tab-btn active" onclick="switchTab('all', this)">전체</button>
      <button class="tab-btn" onclick="switchTab('active', this)">진행중</button>
      <button class="tab-btn" onclick="switchTab('done', this)">완료</button>
    </div>

    <div class="group-tabs-row" id="groupTabsRow"></div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="bottom-row">
      <p class="remaining-count" id="remainingCount"></p>
      <button class="delete-btn" onclick="deleteCompleted()">완료 항목 삭제</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
